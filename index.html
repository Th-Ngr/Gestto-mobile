<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestto - Financeiro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json">
</head>
<body>

<div id="auth">
    <div class="auth-card-content">
        <h1 class="logo" style="color: var(--primary); font-size: 2rem;">Gestto</h1>
        <p style="margin-bottom: 20px; opacity: 0.7;">Gestão simples para o seu negócio</p>
        <div class="form-group"><input type="email" id="email" required><label>E-mail</label></div>
        <div class="form-group"><input type="password" id="password" required><label>Senha</label></div>
        <button class="primary-btn" id="btnLogin">Entrar</button>
        <button class="nav-item" id="btnOpenRegister" style="margin-top: 15px; width: 100%;">Criar nova conta</button>
    </div>
</div>

<div id="modalCadastro" class="modal-overlay" style="display: none;">
    <div class="quick-form">
        <h3>Cadastre-se</h3>
        <form id="formCadastroFirebase">
            <div class="form-group"><input type="text" id="regNome" required><label>Nome Completo</label></div>
            <div class="form-group"><input type="text" id="regEmpresa" required><label>Nome da Empresa</label></div>
            <div class="form-group"><input type="email" id="regEmail" required><label>E-mail</label></div>
            <div class="form-group"><input type="password" id="regSenha" required><label>Senha</label></div>
            <button type="submit" class="primary-btn">Finalizar Cadastro</button>
            <button type="button" onclick="document.getElementById('modalCadastro').style.display='none'" class="nav-item" style="width:100%; margin-top:10px;">Cancelar</button>
        </form>
    </div>
</div>

<div id="app" style="display: none;">
    <header class="header">
        <h1 class="logo">Gestto</h1>
        <div class="saldo">
            <span class="saldo-label">Saldo Geral (Mês)</span>
            <h2 class="saldo-valor">R$ <span id="lucro">0,00</span></h2>
        </div>
        <div class="month-filter"><select id="monthSelect" class="month-select-styled"></select></div>
    </header>

    <main class="container" id="tela-lancamentos">
        <section class="section">
            <div class="section-header" onclick="toggleSecao('entradaBody', this)">
                <h3>Entradas (R$ <span id="totalEntrada">0,00</span>)</h3>
                <span class="chevron"> <i class="fa-solid fa-chevron-down"></i> </span>
            </div>
            <div class="card-list" id="entradaBody"></div>
        </section>

        <section class="section">
            <div class="section-header" onclick="toggleSecao('saidaBody', this)">
                <h3>Saídas (R$ <span id="totalSaida">0,00</span>)</h3>
                <span class="chevron"> <i class="fa-solid fa-chevron-down"></i> </span>
            </div>
            <div class="card-list" id="saidaBody"></div>
        </section>

        <section class="quick-form">
            <h3>Novo Lançamento</h3>
            <div class="form-group"><input type="text" id="descricao" required><label>Descrição</label></div>
            <div class="form-group"><input type="text" id="cliente" required><label>Cliente/Origem</label></div>
            <div class="form-group"><input type="number" id="valor" required><label>Valor</label></div>
            <div class="form-group"><input type="date" id="data" required><label>Data</label></div>
            
            <div class="month-filter" style="margin-bottom: 15px; justify-content: flex-start; gap: 20px; align-items: center;">
                <div style="display: flex; gap: 8px;">
                    <button type="button" id="btnTipoE" class="active" onclick="setTipo('entrada')">Entrada</button>
                    <button type="button" id="btnTipoS" onclick="setTipo('saida')">Saída</button>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="isFixa" style="width: 20px; height: 20px;">
                    <label for="isFixa" style="position: static; font-size: 14px;">Fixa Mensal?</label>
                </div>
            </div>
            
            <input type="hidden" id="tipo" value="entrada">
            <button class="primary-btn" onclick="addLancamento()">Adicionar</button>
        </section>
    </main>

    <main class="container" id="perfilSection" style="display: none;">
        <div class="quick-form" style="text-align: center;">
            <div class="icon income" style="width: 80px; height: 80px; font-size: 40px; margin: 0 auto 15px;"><i class="fa-solid fa-user"></i></div>
            <h2 id="perfilNome">Carregando...</h2>
            <p id="perfilEmail" style="opacity: 0.6; margin-bottom: 20px;"></p>
            <button class="primary-btn" style="background: #ff4d4d;" onclick="logout()">Sair da Conta</button>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" id="nav-home" onclick="navegar('home')">Home</button>
        <button class="nav-item" id="btnConfiguracoes" onclick="navegar('perfil')">Perfil</button>
    </nav>
</div>

<div id="editModal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; align-items:center; justify-content:center; padding:20px;">
    <div class="modal-content" style="background:white; width:100%; max-width:400px; border-radius:15px; padding:20px;">
        <h3 style="margin-bottom:20px;">Editar Lançamento</h3>
        <input type="hidden" id="editId">
        <input type="text" id="editDescricao" placeholder="Descrição" style="width:100%; margin-bottom:10px; padding:12px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="editValor" placeholder="Valor" style="width:100%; margin-bottom:10px; padding:12px; border:1px solid #ddd; border-radius:8px;">
        <input type="date" id="editData" style="width:100%; margin-bottom:10px; padding:12px; border:1px solid #ddd; border-radius:8px;">
        
        <select id="editMes" style="width:100%; margin-bottom:10px; padding:12px; border:1px solid #ddd; border-radius:8px;">
            <option value="Janeiro">Janeiro</option><option value="Fevereiro">Fevereiro</option><option value="Março">Março</option>
            <option value="Abril">Abril</option><option value="Maio">Maio</option><option value="Junho">Junho</option>
            <option value="Julho">Julho</option><option value="Agosto">Agosto</option><option value="Setembro">Setembro</option>
            <option value="Outubro">Outubro</option><option value="Novembro">Novembro</option><option value="Dezembro">Dezembro</option>
        </select>
        
        <select id="editStatus" style="width:100%; margin-bottom:20px; padding:12px; border:1px solid #ddd; border-radius:8px;">
            <option value="Pago">Pago</option>
            <option value="Pendente">Pendente</option>
        </select>

        <div style="display:flex; gap:10px;">
            <button onclick="fecharModal()" style="flex:1; padding:12px; background:#eee; border:none; border-radius:8px;">Cancelar</button>
            <button onclick="salvarEdicao()" style="flex:1; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px;">Salvar</button>
        </div>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
